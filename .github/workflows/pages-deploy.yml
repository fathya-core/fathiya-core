name: Deploy FATHIYA App To GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fathiya-pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and publish gh-pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build FATHIYA app
        run: npm run build

      - name: Prepare Pages artifact
        shell: bash
        run: |
          test -f dist/client/index.html
          test -f dist/client/agent-tasks/index.html
          touch dist/client/.nojekyll

      - name: Publish gh-pages branch
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          deploy_root="$(mktemp -d)"
          trap 'rm -rf "$deploy_root"' EXIT
          git clone --branch gh-pages --single-branch "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$deploy_root"
          find "$deploy_root" -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a dist/client/. "$deploy_root/"
          touch "$deploy_root/.nojekyll"
          cd "$deploy_root"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No gh-pages changes to publish."
          else
            git commit -m "Deploy FATHIYA Pages ${GITHUB_SHA::7}"
            git push origin gh-pages
          fi
