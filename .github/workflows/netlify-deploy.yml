name: Deploy FATHIYA Operator To Netlify

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    env:
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
      FATHIYA_NETLIFY_URL: https://thriving-fenglisu-ef18b1.netlify.app/agent-tasks/
      FATHIYA_DOMAIN_URL: https://fathya-core.com/agent-tasks/
      FATHIYA_WWW_URL: https://www.fathya-core.com/agent-tasks/
    steps:
      - name: Check Netlify configuration
        shell: bash
        run: |
          missing=0
          if [ -z "$NETLIFY_AUTH_TOKEN" ]; then
            echo "::error::Missing NETLIFY_AUTH_TOKEN repository secret. The workflow cannot deploy FATHIYA to Netlify without it."
            missing=1
          fi
          if [ -z "$NETLIFY_SITE_ID" ]; then
            echo "::error::Missing NETLIFY_SITE_ID repository secret. The workflow cannot select the FATHIYA Netlify site without it."
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static operator
        run: npm run build

      - name: Trigger Netlify production build
        shell: bash
        run: |
          response="$(
            curl --fail --silent --show-error \
              --request POST \
              --header "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
              --header "Content-Type: application/json" \
              --data '{}' \
              "https://api.netlify.com/api/v1/sites/$NETLIFY_SITE_ID/builds"
          )"
          deploy_id="$(node -e "const fs = require('fs'); const data = JSON.parse(fs.readFileSync(0, 'utf8')); console.log(data.deploy_id || '')" <<< "$response")"
          if [ -z "$deploy_id" ]; then
            echo "::error::Netlify did not return a deploy_id for the production build."
            echo "$response"
            exit 1
          fi
          echo "NETLIFY_DEPLOY_ID=$deploy_id" >> "$GITHUB_ENV"

      - name: Wait for Netlify production deploy
        shell: bash
        run: |
          for attempt in $(seq 1 60); do
            response="$(
              curl --fail --silent --show-error \
                --header "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
                "https://api.netlify.com/api/v1/deploys/$NETLIFY_DEPLOY_ID"
            )"
            state="$(node -e "const fs = require('fs'); const data = JSON.parse(fs.readFileSync(0, 'utf8')); console.log(data.state || '')" <<< "$response")"
            echo "Netlify deploy $NETLIFY_DEPLOY_ID state: $state"
            if [ "$state" = "ready" ]; then
              exit 0
            fi
            if [ "$state" = "error" ] || [ "$state" = "failed" ]; then
              echo "$response"
              exit 1
            fi
            sleep 10
          done
          echo "::error::Timed out waiting for Netlify deploy $NETLIFY_DEPLOY_ID."
          exit 1

      - name: Verify FATHIYA deploy freshness
        shell: bash
        run: |
          check_url() {
            local label="$1"
            local url="$2"
            local body
            body="$(mktemp)"
            curl --fail --silent --show-error --location "$url" --output "$body"
            if ! grep -q "FATHIYA_DEPLOY_MARKER_20260621_AGENT_OS" "$body"; then
              echo "::error::$label does not contain the current FATHIYA deploy marker: $url"
              exit 1
            fi
            if ! grep -q "FATHIYA_PRIMARY_REQUEST_VIEW_V2" "$body"; then
              echo "::error::$label does not contain the current primary request view: $url"
              exit 1
            fi
            if grep -q "يتوقف عند" "$body"; then
              echo "::error::$label is still serving the stale operator copy: $url"
              exit 1
            fi
          }

          check_url "Netlify production URL" "$FATHIYA_NETLIFY_URL"
          check_url "apex custom domain" "$FATHIYA_DOMAIN_URL"
          check_url "www custom domain" "$FATHIYA_WWW_URL"
