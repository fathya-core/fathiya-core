[build]
command = "npm run build"
publish = "dist/client"

[functions]
directory = "netlify/functions"
included_files = ["artifacts/**", "knowledge/**"]

[[redirects]]
from = "/"
to = "/agent-tasks/"
status = 302
force = true

[[redirects]]
from = "/agent-tasks"
to = "/agent-tasks/index.html"
status = 200
force = true

[[redirects]]
from = "/agent-tasks/*"
to = "/agent-tasks/index.html"
status = 200
force = true

[[redirects]]
from = "/command-center"
to = "/agent-tasks/index.html"
status = 200
force = true

[[redirects]]
from = "/command-center/*"
to = "/agent-tasks/index.html"
status = 200
force = true

[[redirects]]
from = "/ai-console"
to = "/agent-tasks/index.html"
status = 200
force = true

[[redirects]]
from = "/ai-console/*"
to = "/agent-tasks/index.html"
status = 200
force = true

[[redirects]]
from = "/api/artifacts"
to = "/.netlify/functions/artifacts-index"
status = 200
force = true

[[redirects]]
from = "/api/artifacts/"
to = "/.netlify/functions/artifacts-index"
status = 200
force = true

[[redirects]]
from = "/api/artifacts/read"
to = "/.netlify/functions/artifacts-read"
status = 200
force = true

[[redirects]]
from = "/api/learning/status"
to = "/.netlify/functions/learning-status"
status = 200
force = true

[[redirects]]
from = "/api/agent/tasks"
to = "/.netlify/functions/agent-tasks"
status = 200
force = true

[[redirects]]
from = "/api/agent/tasks/*"
to = "/.netlify/functions/agent-tasks?path=:splat"
status = 200
force = true
