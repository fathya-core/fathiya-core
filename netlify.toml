[build]
command = "npm run build"
publish = "dist/client"

[functions]
directory = "netlify/functions"
included_files = ["artifacts/**", "knowledge/**"]

[[redirects]]
from = "/"
to = "/operator-lite/agent-tasks/"
status = 302
force = true

[[redirects]]
from = "/operator-lite/agent-tasks"
to = "/operator-lite/agent-tasks/"
status = 301
force = true

[[redirects]]
from = "/api/artifacts"
to = "/.netlify/functions/artifacts-index"
status = 200
force = true

[[redirects]]
from = "/api/artifacts/"
to = "/.netlify/functions/artifacts-index"
status = 200
force = true

[[redirects]]
from = "/api/artifacts/read"
to = "/.netlify/functions/artifacts-read"
status = 200
force = true

[[redirects]]
from = "/api/learning/status"
to = "/.netlify/functions/learning-status"
status = 200
force = true

[[redirects]]
from = "/api/agent/tasks"
to = "/.netlify/functions/agent-tasks"
status = 200
force = true

[[redirects]]
from = "/api/agent/tasks/*"
to = "/.netlify/functions/agent-tasks?path=:splat"
status = 200
force = true
